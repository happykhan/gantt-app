<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f172a"/>

  <!-- Vertical grid lines (subtle) -->
  <line x1="20" y1="10" x2="20" y2="54" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="36" y1="10" x2="36" y2="54" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="52" y1="10" x2="52" y2="54" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Task bars -->
  <!-- Row 1: WP1 - teal -->
  <rect x="12" y="13" width="26" height="7" rx="2" fill="#0d9488"/>

  <!-- Row 2: WP1 continued - teal lighter -->
  <rect x="20" y="24" width="32" height="7" rx="2" fill="#0d9488" opacity="0.7"/>

  <!-- Row 3: WP2 - indigo -->
  <rect x="30" y="35" width="22" height="7" rx="2" fill="#6366f1"/>

  <!-- Row 4: WP3 - amber -->
  <rect x="38" y="46" width="14" height="7" rx="2" fill="#f59e0b"/>

  <!-- Today marker -->
  <line x1="36" y1="10" x2="36" y2="54" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="3 2"/>
</svg>
