name: Vercel preview smoke

on:
  deployment_status:

permissions:
  contents: read

jobs:
  smoke:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Preview'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      E2E_BASE_URL: ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:preview
      - name: Upload preview smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-smoke-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
